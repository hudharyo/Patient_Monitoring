<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Session Data Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px;
        }

        .header {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: white;
            font-size: 2.5em;
        }

        .header a {
            background: white;
            color: #667eea;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .header a:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            padding: 40px;
        }

        .session-info {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 25px;
            border-radius: 10px;
            margin-bottom: 30px;
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .info-item h3 {
            font-size: 0.9em;
            opacity: 0.9;
            margin-bottom: 5px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .info-item p {
            font-size: 1.3em;
            font-weight: 600;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
        }

        .stat-card.spo2 {
            background: linear-gradient(135deg, #FF6B35 0%, #DC143C 100%);
        }

        .stat-card.spo2.normal {
            background: linear-gradient(135deg, #28A745 0%, #20C997 100%);
        }

        .stat-card.spo2.warning {
            background: linear-gradient(135deg, #FFA500 0%, #FF8C00 100%);
        }

        .stat-card.spo2.critical {
            background: linear-gradient(135deg, #DC143C 0%, #8B0000 100%);
        }

        .stat-value {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        .charts-section {
            margin-bottom: 40px;
        }

        .section-title {
            font-size: 1.5em;
            font-weight: 600;
            color: #333;
            margin-bottom: 20px;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }

        .chart-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(600px, 1fr));
            gap: 20px;
        }

        .chart-wrapper {
            background: #f8f9fa;
            border-radius: 10px;
            padding: 20px;
            border: 2px solid #e0e0e0;
        }

        .chart-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;
        }

        .chart-title {
            font-size: 1.1em;
            font-weight: 600;
            color: #333;
        }

        .chart-controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .nav-btn {
            background: #667eea;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.85em;
        }

        .nav-btn:hover:not(:disabled) {
            background: #764ba2;
            transform: translateY(-2px);
        }

        .nav-btn:disabled {
            background: #ccc;
            cursor: not-allowed;
            transform: none;
        }

        .counter {
            font-size: 0.85em;
            color: #666;
            min-width: 120px;
            text-align: center;
        }

        .chart-container {
            position: relative;
            height: 350px;
        }

        .table-section {
            margin-top: 40px;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 15px;
            background: white;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
            overflow: hidden;
        }

        table thead {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        table th {
            padding: 15px;
            text-align: left;
            font-weight: 600;
        }

        table td {
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
        }

        table tbody tr:hover {
            background: #f8f9fa;
        }

        table tbody tr:nth-child(even) {
            background: #fafafa;
        }

        .id-cell {
            font-weight: 600;
            color: #667eea;
            width: 60px;
        }

        .timestamp-cell {
            color: #666;
            font-size: 0.9em;
            width: 150px;
        }

        .data-cell {
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            max-width: 400px;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .btn-view-data {
            background: #667eea;
            color: white;
            border: none;
            padding: 6px 12px;
            border-radius: 4px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
        }

        .btn-view-data:hover {
            background: #764ba2;
            transform: translateY(-1px);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
        }

        .modal-content {
            background-color: white;
            margin: 5% auto;
            padding: 30px;
            border-radius: 10px;
            width: 90%;
            max-width: 800px;
            max-height: 80vh;
            overflow-y: auto;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            border-bottom: 2px solid #667eea;
            padding-bottom: 15px;
        }

        .modal-header h2 {
            color: #333;
            font-size: 1.3em;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 2em;
            color: #aaa;
            cursor: pointer;
            padding: 0;
            width: 40px;
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .close-btn:hover {
            color: #333;
        }

        .modal-data {
            background: #f4f4f4;
            padding: 20px;
            border-radius: 8px;
            font-family: 'Courier New', monospace;
            font-size: 0.9em;
            white-space: pre-wrap;
            word-break: break-word;
            overflow-x: auto;
        }

        #loading {
            text-align: center;
            padding: 60px 20px;
            color: #666;
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .no-data {
            text-align: center;
            padding: 40px;
            color: #999;
            font-size: 1.1em;
        }

        @media (max-width: 1200px) {
            .session-info {
                grid-template-columns: 1fr;
            }

            .chart-grid {
                grid-template-columns: 1fr;
            }

            .header {
                flex-direction: column;
            }

            .table-section {
                overflow-x: auto;
            }
        }
    </style>
</head>
<body>
    <!--
        session-detail.html
        Purpose: Inspect and visualize the stored records for a single session.

        Usage:
        - The page expects a query parameter `id` (session id). Example:
            /session-detail?id=12

        Key elements (IDs):
        - sessionInfo   : top area showing patient name, start time, duration
        - statsGrid     : summary statistics about the session records
        - chartsSection : where per-field Chart.js charts are created
        - tableContainer: table listing all stored records (one per per-session row)
        - dataModal     : modal to inspect the full JSON for a single record

        Backend interactions:
        - GET /get-session-info : fetch session metadata (patient_name, table_name, timestamp)
        - GET /get-session-data : fetch rows from the per-session table for the given session id

        Notes:
        - This page is read-only and uses the per-session table created when the
          session was started. Charts and table rows are generated client-side.
    -->
    <div class="header">
        <h1>📊 Session Data Viewer</h1>
        <a href="/history">← Back to History</a>
    </div>

    <div class="container">
        <div id="loading">
            <div class="spinner"></div>
            <p>Loading session data...</p>
        </div>

        <div id="content" style="display: none;">
            <!-- Session Info -->
            <div class="session-info" id="sessionInfo"></div>

            <!-- Statistics -->
            <div class="stats-grid" id="statsGrid"></div>

            <!-- Charts Section -->
            <div class="charts-section" id="chartsSection"></div>

            <!-- Table Section -->
            <div class="table-section">
                <h2 class="section-title">📋 Session Records</h2>
                <div id="tableContainer"></div>
            </div>
        </div>
    </div>

    <!-- Data Detail Modal -->
    <div id="dataModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2>Record Details</h2>
                <button class="close-btn" onclick="closeModal()">&times;</button>
            </div>
            <div id="modalDataContent" class="modal-data"></div>
        </div>
    </div>

    <script>
        let sessionData = [];
        let charts = {};
        let chartData = {};
        const MAX_POINTS = 1000;
        const DISPLAY_POINTS = 50;
        let currentView = {};
        let sessionInfo = null;

        window.addEventListener('load', () => {
            const params = new URLSearchParams(window.location.search);
            const sessionId = params.get('id');
            if (sessionId) {
                loadSessionData(sessionId);
            } else {
                document.getElementById('content').innerHTML = '<div class="no-data">No session ID provided</div>';
            }
        });

        async function loadSessionData(sessionId) {
            try {
                // Get session info
                const sessionResponse = await fetch(`/get-session-info?session_id=${sessionId}`);
                const sessionDataInfo = await sessionResponse.json();
                sessionInfo = sessionDataInfo;

                // Get session records
                const recordsResponse = await fetch(`/get-session-data?session_id=${sessionId}`);
                const records = await recordsResponse.json();
                
                sessionData = records.data || [];

                document.getElementById('loading').style.display = 'none';
                document.getElementById('content').style.display = 'block';

                if (sessionData.length > 0) {
                    renderSessionInfo();
                    displayStats();
                    initializeCharts();
                    displayTable();
                } else {
                    document.getElementById('content').innerHTML = '<div class="no-data">No data records for this session</div>';
                }
            } catch (error) {
                console.error('Error loading session data:', error);
                document.getElementById('loading').innerHTML = `<div class="no-data">Error loading data: ${error.message}</div>`;
            }
        }

        function renderSessionInfo() {
            if (!sessionInfo) return;

            const startTime = new Date(sessionInfo.timestamp);
            const endTime = new Date(sessionData[sessionData.length - 1]?.timestamp || sessionInfo.timestamp);
            const duration = Math.round((endTime - startTime) / 1000);

            document.getElementById('sessionInfo').innerHTML = `
                <div class="info-item">
                    <h3>Patient</h3>
                    <p>${escapeHtml(sessionInfo.patient_name)}</p>
                </div>
                <div class="info-item">
                    <h3>Session Start</h3>
                    <p>${startTime.toLocaleString()}</p>
                </div>
                <div class="info-item">
                    <h3>Duration</h3>
                    <p>${duration}s</p>
                </div>
            `;
        }

        function displayStats() {
            const uniqueFields = new Set();
            let minValue = {}, maxValue = {}, avgValue = {}, fieldCounts = {};
            let spo2Values = [];

            sessionData.forEach(item => {
                try {
                    const data = JSON.parse(item.data);
                    Object.keys(data).forEach(key => {
                        if (!key.startsWith('_') && typeof data[key] === 'number') {
                            uniqueFields.add(key);
                            minValue[key] = Math.min(minValue[key] ?? Infinity, data[key]);
                            maxValue[key] = Math.max(maxValue[key] ?? -Infinity, data[key]);
                            avgValue[key] = (avgValue[key] || 0) + data[key];
                            fieldCounts[key] = (fieldCounts[key] || 0) + 1;
                            
                            // Collect SpO2 values
                            if (key.toLowerCase().includes('spo2')) {
                                spo2Values.push(data[key]);
                            }
                        }
                    });
                } catch (e) {}
            });

            // Calculate averages
            Object.keys(avgValue).forEach(key => {
                avgValue[key] = (avgValue[key] / fieldCounts[key]).toFixed(2);
            });

            let statsHtml = `
                <div class="stat-card">
                    <div class="stat-value">${sessionData.length}</div>
                    <div class="stat-label">Total Records</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value">${uniqueFields.size}</div>
                    <div class="stat-label">Data Fields</div>
                </div>
            `;

            // Add SpO2 statistics if available
            if (spo2Values.length > 0) {
                const minSpO2 = Math.min(...spo2Values);
                const maxSpO2 = Math.max(...spo2Values);
                const avgSpO2 = (spo2Values.reduce((a, b) => a + b, 0) / spo2Values.length).toFixed(1);
                
                // Determine overall SpO2 status based on average
                let spo2Status = 'normal';
                if (avgSpO2 >= 95) spo2Status = 'normal';
                else if (avgSpO2 >= 90) spo2Status = 'warning';
                else spo2Status = 'critical';
                
                statsHtml += `
                    <div class="stat-card spo2 ${spo2Status}">
                        <div class="stat-value">${avgSpO2}%</div>
                        <div class="stat-label">Avg SpO₂</div>
                    </div>
                    <div class="stat-card spo2">
                        <div class="stat-value">${minSpO2.toFixed(1)}% - ${maxSpO2.toFixed(1)}%</div>
                        <div class="stat-label">SpO₂ Range</div>
                    </div>
                `;
            }

            document.getElementById('statsGrid').innerHTML = statsHtml;
        }

        function initializeCharts() {
            const numericFields = new Set();
            
            sessionData.forEach(item => {
                try {
                    const data = JSON.parse(item.data);
                    Object.keys(data).forEach(key => {
                        if (!key.startsWith('_') && typeof data[key] === 'number') {
                            numericFields.add(key);
                        }
                    });
                } catch (e) {}
            });

            numericFields.forEach(field => {
                chartData[field] = [];
                currentView[field] = 0;

                sessionData.forEach(item => {
                    try {
                        const data = JSON.parse(item.data);
                        if (field in data) {
                            chartData[field].push({
                                time: new Date(item.timestamp).toLocaleTimeString(),
                                value: data[field]
                            });
                        }
                    } catch (e) {}
                });

                if (chartData[field].length > MAX_POINTS) {
                    chartData[field] = chartData[field].slice(-MAX_POINTS);
                }

                createChart(field);
            });
        }

        function createChart(fieldName) {
            const chartsSection = document.getElementById('chartsSection');
            const wrapper = document.createElement('div');
            wrapper.className = 'chart-wrapper';
            wrapper.id = `chart-wrapper-${fieldName}`;

            const chartsGrid = document.getElementById('charts-grid') || document.createElement('div');
            chartsGrid.id = 'charts-grid';
            chartsGrid.className = 'chart-grid';

            if (!document.getElementById('charts-grid')) {
                chartsSection.appendChild(chartsGrid);
            }

            wrapper.innerHTML = `
                <div class="chart-header">
                    <div class="chart-title">${fieldName}</div>
                    <div class="chart-controls">
                        <button class="nav-btn" id="prev-${fieldName}" onclick="navigateChart('${fieldName}', -1)">← Prev</button>
                        <span class="counter" id="counter-${fieldName}">0 / 0</span>
                        <button class="nav-btn" id="next-${fieldName}" onclick="navigateChart('${fieldName}', 1)">Next →</button>
                    </div>
                </div>
                <div class="chart-container">
                    <canvas id="chart-${fieldName}"></canvas>
                </div>
            `;

            chartsGrid.appendChild(wrapper);

            // Determine chart color based on field name
            let borderColor = '#667eea';
            let backgroundColor = 'rgba(102, 126, 234, 0.1)';
            
            if (fieldName.toLowerCase().includes('spo2')) {
                borderColor = '#FF6B35';
                backgroundColor = 'rgba(255, 107, 53, 0.1)';
            }

            const ctx = document.getElementById(`chart-${fieldName}`);
            charts[fieldName] = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: [],
                    datasets: [{
                        label: fieldName,
                        data: [],
                        borderColor: borderColor,
                        backgroundColor: backgroundColor,
                        tension: 0.4,
                        fill: true,
                        pointRadius: 3,
                        pointHoverRadius: 5,
                        borderWidth: 2
                    }]
                },
                options: {
                    responsive: true,
                    maintainAspectRatio: false,
                    plugins: {
                        legend: { display: true, position: 'top' }
                    },
                    scales: { y: { beginAtZero: false } }
                }
            });

            updateChartDisplay(fieldName);
        }

        function updateChartDisplay(fieldName) {
            const totalPoints = chartData[fieldName].length;
            const startIdx = currentView[fieldName];
            const endIdx = Math.min(startIdx + DISPLAY_POINTS, totalPoints);
            
            const visibleData = chartData[fieldName].slice(startIdx, endIdx);
            
            const chart = charts[fieldName];
            chart.data.labels = visibleData.map(d => d.time);
            chart.data.datasets[0].data = visibleData.map(d => d.value);
            chart.update();

            document.getElementById(`counter-${fieldName}`).textContent = `${startIdx + 1} - ${endIdx} / ${totalPoints}`;
            document.getElementById(`prev-${fieldName}`).disabled = startIdx === 0;
            document.getElementById(`next-${fieldName}`).disabled = endIdx >= totalPoints;
        }

        function navigateChart(fieldName, direction) {
            const totalPoints = chartData[fieldName].length;
            const newView = currentView[fieldName] + (direction * DISPLAY_POINTS);
            currentView[fieldName] = Math.max(0, Math.min(newView, Math.max(0, totalPoints - DISPLAY_POINTS)));
            updateChartDisplay(fieldName);
        }

        function displayTable() {
            const tableContainer = document.getElementById('tableContainer');
            
            if (sessionData.length === 0) {
                tableContainer.innerHTML = '<div class="no-data">No data available</div>';
                return;
            }

            let html = '<table><thead><tr><th>ID</th><th>Timestamp</th><th>Data</th><th>Action</th></tr></thead><tbody>';

            sessionData.forEach((item, index) => {
                const timestamp = new Date(item.timestamp).toLocaleString();
                const dataPreview = item.data.substring(0, 100) + (item.data.length > 100 ? '...' : '');
                html += `
                    <tr>
                        <td class="id-cell">${index + 1}</td>
                        <td class="timestamp-cell">${timestamp}</td>
                        <td class="data-cell">${escapeHtml(dataPreview)}</td>
                        <td><button class="btn-view-data" onclick="showModal(${index})">View</button></td>
                    </tr>
                `;
            });

            html += '</tbody></table>';
            tableContainer.innerHTML = html;
        }

        function showModal(index) {
            const item = sessionData[index];
            try {
                const data = JSON.parse(item.data);
                document.getElementById('modalDataContent').textContent = JSON.stringify(data, null, 2);
            } catch (e) {
                document.getElementById('modalDataContent').textContent = item.data;
            }
            document.getElementById('dataModal').style.display = 'block';
        }

        function closeModal() {
            document.getElementById('dataModal').style.display = 'none';
        }

        function escapeHtml(text) {
            const map = { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#039;' };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        window.onclick = function(event) {
            const modal = document.getElementById('dataModal');
            if (event.target === modal) modal.style.display = 'none';
        };
    </script>
</body>
</html>
