<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Patient History & Sessions</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 30px;
        }

        .header {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            flex-wrap: wrap;
            gap: 20px;
        }

        .header h1 {
            color: white;
            font-size: 2.5em;
        }

        .header a {
            background: white;
            color: #667eea;
            padding: 12px 24px;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            transition: all 0.3s;
        }

        .header a:hover {
            background: #f0f0f0;
            transform: translateY(-2px);
        }

        .container {
            max-width: 1600px;
            margin: 0 auto;
            background: white;
            border-radius: 15px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .content {
            display: grid;
            grid-template-columns: 1fr 2fr;
            gap: 0;
            min-height: 600px;
        }

        .patients-panel {
            background: #f9f9f9;
            border-right: 2px solid #e0e0e0;
            overflow-y: auto;
            max-height: 80vh;
        }

        .sessions-panel {
            background: white;
            overflow-y: auto;
            max-height: 80vh;
        }

        .panel-header {
            padding: 25px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            font-size: 1.3em;
            font-weight: 600;
            position: sticky;
            top: 0;
            z-index: 10;
        }

        .panel-content {
            padding: 20px;
        }

        .patient-item {
            background: white;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 12px;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 10px;
        }

        .patient-item:hover {
            border-color: #667eea;
            background: #f5f5f5;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
            transform: translateX(5px);
        }

        .patient-item.active {
            background: #667eea;
            color: white;
            border-color: #667eea;
        }

        .patient-info {
            flex: 1;
        }

        .patient-name {
            font-weight: 600;
            font-size: 1.1em;
            margin-bottom: 3px;
        }

        .patient-date {
            font-size: 0.85em;
            opacity: 0.8;
        }

        .patient-item.active .patient-date {
            opacity: 0.9;
        }

        .btn-delete-patient {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.85em;
            transition: all 0.2s;
            white-space: nowrap;
        }

        .btn-delete-patient:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        .empty-state {
            text-align: center;
            padding: 50px 20px;
            color: #999;
        }

        .empty-state-icon {
            font-size: 3em;
            margin-bottom: 15px;
            opacity: 0.5;
        }

        .sessions-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .session-item {
            background: #f9f9f9;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            transition: all 0.2s;
            cursor: pointer;
        }

        .session-item:hover {
            border-color: #667eea;
            background: white;
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.2);
            transform: translateX(5px);
        }

        .session-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
            gap: 10px;
            flex-wrap: wrap;
        }

        .session-title {
            font-weight: 600;
            font-size: 1.1em;
            color: #333;
        }

        .session-time {
            font-size: 0.9em;
            color: #667eea;
            font-weight: 500;
        }

        .session-meta {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            font-size: 0.9em;
            color: #666;
        }

        .meta-item {
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .meta-icon {
            font-size: 1.2em;
        }

        .session-actions {
            display: flex;
            gap: 10px;
            margin-top: 15px;
            flex-wrap: wrap;
        }

        .btn-view {
            flex: 1;
            min-width: 120px;
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-view:hover {
            background: #764ba2;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.3);
        }

        .btn-delete-session {
            flex: 1;
            min-width: 120px;
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 16px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-delete-session:hover {
            background: #ff5252;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(255, 107, 107, 0.3);
        }

        .modal {
            display: none;
            position: fixed;
            z-index: 1000;
            left: 0;
            top: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            animation: fadeIn 0.3s;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .modal-content {
            background-color: white;
            margin: 10% auto;
            padding: 30px;
            border-radius: 10px;
            width: 400px;
            max-width: 90%;
            box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
            animation: slideIn 0.3s;
        }

        @keyframes slideIn {
            from { transform: translateY(-50px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-header {
            font-size: 1.5em;
            font-weight: 600;
            color: #333;
            margin-bottom: 15px;
        }

        .modal-message {
            color: #666;
            margin-bottom: 25px;
            line-height: 1.6;
        }

        .modal-buttons {
            display: flex;
            gap: 10px;
            justify-content: flex-end;
        }

        .btn-cancel {
            background: #ddd;
            color: #333;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-cancel:hover {
            background: #ccc;
        }

        .btn-confirm {
            background: #ff6b6b;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-confirm:hover {
            background: #ff5252;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-top: 20px;
        }

        .stat-box {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
        }

        .stat-number {
            font-size: 2em;
            font-weight: 700;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 0.9em;
            opacity: 0.9;
        }

        @media (max-width: 1200px) {
            .content {
                grid-template-columns: 1fr;
            }

            .patients-panel {
                border-right: none;
                border-bottom: 2px solid #e0e0e0;
                max-height: none;
            }

            .header {
                flex-direction: column;
            }

            .stats {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <!--
        history.html
        Purpose: Browse patients and their sessions, view session counts and delete data.

        Key elements (IDs):
        - patientsList : container where patients and stats are rendered
        - sessionsList : container listing sessions for the selected patient
        - deleteModal  : confirmation modal used for deleting patients or sessions

        Backend interactions:
        - GET /get-all-patients           : list all patients
        - GET /get-patient-sessions      : list sessions for a specific patient
        - GET /get-session-record-count  : obtain record counts per-session table
        - DELETE /delete-patient         : deletes a patient and drops per-session tables
        - DELETE /delete-session         : deletes a session and drops its per-session table

        Notes:
        - Deleting a patient will attempt to drop all per-session tables referenced
          by the `sessions` table, then remove session rows and the patient row.
    -->
    <div class="header">
        <h1>📋 Patient History</h1>
        <a href="/">← Back to Home</a>
    </div>

    <div class="container">
        <div class="content">
            <!-- Patients Panel -->
            <div class="patients-panel">
                <div class="panel-header">👥 Patients</div>
                <div class="panel-content">
                    <div id="patientsList"></div>
                </div>
            </div>

            <!-- Sessions Panel -->
            <div class="sessions-panel">
                <div class="panel-header">📅 Sessions</div>
                <div class="panel-content">
                    <div id="sessionsList"></div>
                </div>
            </div>
        </div>
    </div>

    <!-- Delete Confirmation Modal -->
    <div id="deleteModal" class="modal">
        <div class="modal-content">
            <div class="modal-header">Confirm Delete</div>
            <div class="modal-message" id="deleteMessage"></div>
            <div class="modal-buttons">
                <button class="btn-cancel" onclick="closeDeleteModal()">Cancel</button>
                <button class="btn-confirm" onclick="confirmDelete()">Delete</button>
            </div>
        </div>
    </div>

    <script>
        let selectedPatient = null;
        let pendingDelete = { type: null, id: null };

        // Load patients on page load
        window.addEventListener('load', loadPatients);

        async function loadPatients() {
            try {
                const response = await fetch('/get-all-patients');
                const data = await response.json();
                
                if (data.patients && data.patients.length > 0) {
                    renderPatients(data.patients);
                    // Select first patient by default
                    if (data.patients.length > 0) {
                        selectPatient(data.patients[0].id);
                    }
                } else {
                    renderEmptyState();
                }
            } catch (error) {
                console.error('Error loading patients:', error);
            }
        }

        function renderPatients(patients) {
            const patientsList = document.getElementById('patientsList');
            
            // Add stats
            const statsHtml = `
                <div class="stats">
                    <div class="stat-box">
                        <div class="stat-number">${patients.length}</div>
                        <div class="stat-label">Total Patients</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="totalSessions">0</div>
                        <div class="stat-label">Total Sessions</div>
                    </div>
                    <div class="stat-box">
                        <div class="stat-number" id="totalRecords">0</div>
                        <div class="stat-label">Total Records</div>
                    </div>
                </div>
            `;
            
            const patientsHtml = patients.map(patient => `
                <div class="patient-item ${selectedPatient?.id === patient.id ? 'active' : ''}" onclick="selectPatient(${patient.id})">
                    <div class="patient-info">
                        <div class="patient-name">${escapeHtml(patient.patient_name)}</div>
                        <div class="patient-date">${new Date(patient.created_at).toLocaleString()}</div>
                    </div>
                    <button class="btn-delete-patient" onclick="openDeletePatientModal(${patient.id}, '${patient.patient_name}'); event.stopPropagation();">Delete</button>
                </div>
            `).join('');
            
            patientsList.innerHTML = statsHtml + patientsHtml;
            
            // Calculate stats
            calculateStats(patients);
        }

        function renderEmptyState() {
            document.getElementById('patientsList').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📭</div>
                    <p>No patients found</p>
                </div>
            `;
            document.getElementById('sessionsList').innerHTML = `
                <div class="empty-state">
                    <div class="empty-state-icon">📅</div>
                    <p>Select a patient to view sessions</p>
                </div>
            `;
        }

        async function selectPatient(patientId) {
            try {
                const response = await fetch(`/get-patient-sessions?patient_id=${patientId}`);
                const data = await response.json();
                
                selectedPatient = data.patient;
                
                // Update active state
                document.querySelectorAll('.patient-item').forEach(item => {
                    item.classList.remove('active');
                });
                event?.target?.closest('.patient-item')?.classList.add('active');
                
                renderSessions(data.sessions || []);
            } catch (error) {
                console.error('Error loading sessions:', error);
            }
        }

        function renderSessions(sessions) {
            const sessionsList = document.getElementById('sessionsList');
            
            if (sessions.length === 0) {
                sessionsList.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📅</div>
                        <p>No sessions for this patient</p>
                    </div>
                `;
                return;
            }
            
            const sessionsHtml = sessions.map(session => {
                const startTime = new Date(session.timestamp);
                return `
                    <div class="session-item">
                        <div class="session-header">
                            <div class="session-title">Session #${session.id}</div>
                            <div class="session-time">${startTime.toLocaleString()}</div>
                        </div>
                        <div class="session-meta">
                            <div class="meta-item">
                                <span class="meta-icon">📊</span>
                                <span id="recordCount-${session.id}">Loading...</span>
                            </div>
                            <div class="meta-item">
                                <span class="meta-icon">💾</span>
                                <span>Table: <strong>${escapeHtml(session.table_name)}</strong></span>
                            </div>
                        </div>
                        <div class="session-actions">
                            <button class="btn-view" onclick="viewSessionData(${session.id}, '${session.patient_name}')">View Data</button>
                            <button class="btn-delete-session" onclick="openDeleteSessionModal(${session.id}, '${session.patient_name}'); event.stopPropagation();">Delete</button>
                        </div>
                    </div>
                `;
            }).join('');
            
            sessionsList.innerHTML = sessionsHtml;
            
            // Load record counts for each session
            sessions.forEach(session => {
                loadSessionRecordCount(session.id, session.table_name);
            });
        }

        async function loadSessionRecordCount(sessionId, tableName) {
            try {
                const response = await fetch(`/get-session-record-count?table_name=${encodeURIComponent(tableName)}`);
                const data = await response.json();
                const countElement = document.getElementById(`recordCount-${sessionId}`);
                if (countElement) {
                    countElement.textContent = `${data.count || 0} records`;
                }
            } catch (error) {
                console.error('Error loading record count:', error);
            }
        }

        async function calculateStats(patients) {
            try {
                let totalSessions = 0;
                let totalRecords = 0;
                
                for (const patient of patients) {
                    const response = await fetch(`/get-patient-sessions?patient_id=${patient.id}`);
                    const data = await response.json();
                    
                    totalSessions += data.sessions?.length || 0;
                    
                    for (const session of (data.sessions || [])) {
                        const countResponse = await fetch(`/get-session-record-count?table_name=${encodeURIComponent(session.table_name)}`);
                        const countData = await countResponse.json();
                        totalRecords += countData.count || 0;
                    }
                }
                
                document.getElementById('totalSessions').textContent = totalSessions;
                document.getElementById('totalRecords').textContent = totalRecords;
            } catch (error) {
                console.error('Error calculating stats:', error);
            }
        }

        function viewSessionData(sessionId, patientName) {
            localStorage.setItem('viewSessionId', sessionId);
            window.location.href = `/session-detail?id=${sessionId}`;
        }

        function openDeletePatientModal(patientId, patientName) {
            pendingDelete = { type: 'patient', id: patientId };
            document.getElementById('deleteMessage').textContent = `Are you sure you want to delete patient "${escapeHtml(patientName)}" and all their sessions?`;
            document.getElementById('deleteModal').style.display = 'block';
        }

        function openDeleteSessionModal(sessionId, patientName) {
            pendingDelete = { type: 'session', id: sessionId };
            document.getElementById('deleteMessage').textContent = `Are you sure you want to delete this session and all its data?`;
            document.getElementById('deleteModal').style.display = 'block';
        }

        function closeDeleteModal() {
            document.getElementById('deleteModal').style.display = 'none';
            pendingDelete = { type: null, id: null };
        }

        async function confirmDelete() {
            if (!pendingDelete.type) return;
            
            try {
                const endpoint = pendingDelete.type === 'patient' 
                    ? `/delete-patient?patient_id=${pendingDelete.id}`
                    : `/delete-session?session_id=${pendingDelete.id}`;
                
                const response = await fetch(endpoint, { method: 'DELETE' });
                
                if (response.ok) {
                    closeDeleteModal();
                    loadPatients();
                }
            } catch (error) {
                console.error('Error deleting:', error);
                alert('Error deleting. Please try again.');
            }
        }

        function escapeHtml(text) {
            const map = {
                '&': '&amp;',
                '<': '&lt;',
                '>': '&gt;',
                '"': '&quot;',
                "'": '&#039;'
            };
            return text.replace(/[&<>"']/g, m => map[m]);
        }

        // Close modal when clicking outside
        window.onclick = function(event) {
            const modal = document.getElementById('deleteModal');
            if (event.target == modal) {
                modal.style.display = 'none';
            }
        }
    </script>
</body>
</html>
